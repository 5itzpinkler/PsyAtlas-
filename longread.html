<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Лонгрід · Атлас механізмів психіки</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#1a1013; --bg-soft:#21151a; --card:#2b1920; --card-border:#4a2e37;
  --border-soft:#3a2229; --text:#ede2d3; --text-dim:#b3a292; --text-faint:#7d6a5e;
  --gold:#c98a3f; --gold-soft:#3d2a1a; --sage:#7c8f70;
}
*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{margin:0;background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;
  line-height:1.7;}

/* --- прогрес читання --- */
#progress{position:fixed;top:0;left:0;height:2px;background:var(--gold);z-index:100;width:0;
  transition:width .1s linear;}

/* --- топбар --- */
#top{position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:14px;
  padding:14px 28px;background:rgba(26,16,19,.94);backdrop-filter:blur(8px);
  border-bottom:1px solid var(--border-soft);}
#top a.back{color:var(--text-dim);text-decoration:none;font-size:13px;
  border:1px solid var(--card-border);border-radius:3px;padding:8px 13px;
  background:var(--card);transition:.15s;white-space:nowrap;}
#top a.back:hover{border-color:var(--gold);color:var(--text);}
#top .crumb{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.06em;
  text-transform:uppercase;color:var(--text-faint);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
#top .crumb a{color:var(--gold);text-decoration:none;}
#top .crumb a:hover{text-decoration:underline;}

/* --- макет: зміст + текст --- */
.wrap{max-width:1180px;margin:0 auto;padding:40px 28px 120px;
  display:grid;grid-template-columns:1fr 240px;gap:56px;align-items:start;}

/* --- сам лонгрід --- */
article{max-width:none;}
article h1{font-family:'Spectral',serif;font-weight:600;font-size:40px;line-height:1.18;
  margin:0 0 10px;letter-spacing:-.01em;}
article .subtitle{font-size:17px;color:var(--text-dim);line-height:1.6;margin:0 0 8px;
  max-width:62ch;}
article .meta{font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:var(--text-faint);
  letter-spacing:.05em;padding-bottom:26px;margin-bottom:34px;border-bottom:1px solid var(--border-soft);}

article h2{font-family:'Spectral',serif;font-weight:600;font-size:27px;line-height:1.28;
  margin:52px 0 16px;scroll-margin-top:80px;}
article h3{font-family:'Spectral',serif;font-weight:500;font-size:20px;line-height:1.35;
  margin:36px 0 12px;color:var(--text);scroll-margin-top:80px;}
article p{font-size:17px;line-height:1.78;color:var(--text-dim);margin:0 0 20px;max-width:66ch;}
article strong{color:var(--text);font-weight:600;}
article em{font-style:italic;}
article a{color:var(--gold);text-decoration:none;border-bottom:1px solid var(--gold-soft);
  transition:border-color .15s;}
article a:hover{border-bottom-color:var(--gold);}

article ul, article ol{max-width:66ch;padding-left:22px;margin:0 0 22px;}
article li{font-size:17px;line-height:1.75;color:var(--text-dim);margin-bottom:9px;}
article li::marker{color:var(--gold);}

article blockquote{margin:28px 0;padding:2px 0 2px 22px;border-left:2px solid var(--gold);
  max-width:64ch;}
article blockquote p{font-family:'Spectral',serif;font-style:italic;font-size:18px;
  color:var(--text);line-height:1.68;}

article code{font-family:'IBM Plex Mono',monospace;font-size:14px;background:var(--card);
  padding:2px 6px;border-radius:2px;color:var(--gold);}
article pre{background:var(--bg-soft);border:1px solid var(--border-soft);border-radius:3px;
  padding:18px;overflow-x:auto;max-width:66ch;margin:0 0 22px;}
article pre code{background:none;padding:0;color:var(--text-dim);font-size:13.5px;line-height:1.6;}

article table{border-collapse:collapse;margin:0 0 26px;font-size:15px;width:100%;max-width:66ch;}
article th{text-align:left;font-family:'IBM Plex Mono',monospace;font-size:11px;
  text-transform:uppercase;letter-spacing:.07em;color:var(--text-faint);font-weight:500;
  padding:10px 14px 10px 0;border-bottom:1px solid var(--card-border);}
article td{padding:12px 14px 12px 0;border-bottom:1px solid var(--border-soft);
  color:var(--text-dim);line-height:1.6;vertical-align:top;}

article hr{border:none;border-top:1px solid var(--border-soft);margin:44px 0;max-width:66ch;}

article img{max-width:100%;height:auto;border:1px solid var(--card-border);border-radius:2px;
  display:block;margin:26px 0 8px;}

/* --- зміст (правий стовпчик) --- */
#toc{position:sticky;top:80px;font-size:13px;}
#toc .toc-title{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.09em;
  text-transform:uppercase;color:var(--text-faint);margin-bottom:14px;
  padding-bottom:9px;border-bottom:1px solid var(--border-soft);}
#toc a{display:block;color:var(--text-faint);text-decoration:none;padding:6px 0 6px 12px;
  border-left:1px solid var(--border-soft);line-height:1.45;transition:.15s;}
#toc a:hover{color:var(--text-dim);border-left-color:var(--text-faint);}
#toc a.active{color:var(--gold);border-left-color:var(--gold);}
#toc a.lvl3{padding-left:24px;font-size:12px;}

/* --- назад до вузла --- */
.node-link{margin-top:56px;padding:20px 22px;background:var(--card);
  border:1px solid var(--card-border);border-radius:3px;max-width:66ch;}
.node-link .nl-label{font-family:'IBM Plex Mono',monospace;font-size:10.5px;
  letter-spacing:.08em;text-transform:uppercase;color:var(--text-faint);margin-bottom:8px;}
.node-link a{color:var(--gold);text-decoration:none;font-size:15px;font-weight:500;
  border:none;}
.node-link a:hover{text-decoration:underline;}

#loading, #error{padding:80px 0;text-align:center;color:var(--text-faint);font-size:14px;}
#error a{color:var(--gold);}

@media (max-width: 900px){
  .wrap{grid-template-columns:1fr;gap:0;padding:28px 20px 80px;}
  #toc{display:none;}
  article h1{font-size:30px;}
  article h2{font-size:23px;margin:40px 0 14px;}
  article h3{font-size:18px;}
  article p, article li{font-size:16.5px;}
  #top{padding:12px 18px;gap:10px;}
}
</style>
</head>
<body>

<div id="progress"></div>

<div id="top">
  <a class="back" href="neuro_atlas_index.html">← Атлас</a>
  <div class="crumb" id="crumb"></div>
</div>

<div class="wrap">
  <article id="content">
    <div id="loading">Завантажую…</div>
  </article>
  <nav id="toc"></nav>
</div>

<script src="marked.min.js"></script>
<script>
(function(){
  const params = new URLSearchParams(location.search);
  const slug = (params.get('id') || '').replace(/[^a-zA-Z0-9_-]/g, '');  // безпека: тільки безпечні символи

  if(!slug){
    document.getElementById('content').innerHTML =
      '<div id="error">Не вказано, який лонгрід відкрити.<br><a href="neuro_atlas_index.html">← Повернутись до атласу</a></div>';
    return;
  }

  fetch(`longreads/${slug}.md`)
    .then(r => { if(!r.ok) throw new Error('404'); return r.text(); })
    .then(md => render(md))
    .catch(() => {
      document.getElementById('content').innerHTML =
        `<div id="error">Лонгрід «${slug}» ще не написаний.<br><a href="neuro_atlas_index.html">← Повернутись до атласу</a></div>`;
    });

  function render(md){
    // --- frontmatter: --- ключ: значення ---
    let meta = {};
    const fm = md.match(/^---\n([\s\S]*?)\n---\n/);
    if(fm){
      fm[1].split('\n').forEach(line => {
        const i = line.indexOf(':');
        if(i > 0) meta[line.slice(0,i).trim()] = line.slice(i+1).trim();
      });
      md = md.slice(fm[0].length);
    }

    marked.setOptions({ gfm:true, breaks:false, headerIds:false, mangle:false });
    let html = marked.parse(md);

    const art = document.getElementById('content');
    const parts = [];

    if(meta.title) parts.push(`<h1>${esc(meta.title)}</h1>`);
    if(meta.subtitle) parts.push(`<p class="subtitle">${esc(meta.subtitle)}</p>`);

    const metaBits = [];
    if(meta.reading) metaBits.push(esc(meta.reading));
    if(meta.updated) metaBits.push('оновлено ' + esc(meta.updated));
    if(metaBits.length) parts.push(`<div class="meta">${metaBits.join(' · ')}</div>`);

    parts.push(html);

    // Посилання назад на вузол атласу
    if(meta.node && meta.domain){
      const label = meta.node_label || meta.node;
      parts.push(`
        <div class="node-link">
          <div class="nl-label">Вузол в атласі</div>
          <a href="${esc(meta.domain)}#${esc(meta.node)}">${esc(label)} →</a>
        </div>`);
    }

    art.innerHTML = parts.join('\n');

    // Хлібні крихти
    const crumb = document.getElementById('crumb');
    crumb.innerHTML = meta.domain && meta.node_label
      ? `<a href="${esc(meta.domain)}">${esc(meta.domain_label || 'Домен')}</a> · ${esc(meta.node_label)}`
      : (meta.title ? esc(meta.title) : '');

    document.title = (meta.title || 'Лонгрід') + ' · Атлас механізмів психіки';

    buildTOC();
    trackProgress();
  }

  function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'); }

  function slugify(t){
    return t.toLowerCase().replace(/[^\wа-яїієґ\s-]/gi,'').trim().replace(/\s+/g,'-');
  }

  function buildTOC(){
    const heads = document.querySelectorAll('article h2, article h3');
    if(!heads.length) return;
    const toc = document.getElementById('toc');
    toc.innerHTML = '<div class="toc-title">Зміст</div>';
    heads.forEach(h => {
      if(!h.id) h.id = slugify(h.textContent);
      const a = document.createElement('a');
      a.href = '#' + h.id;
      a.textContent = h.textContent;
      if(h.tagName === 'H3') a.className = 'lvl3';
      toc.appendChild(a);
    });

    // підсвітка активного розділу
    const links = toc.querySelectorAll('a');
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if(e.isIntersecting){
          links.forEach(l => l.classList.toggle('active', l.getAttribute('href') === '#' + e.target.id));
        }
      });
    }, { rootMargin: '-80px 0px -70% 0px' });
    heads.forEach(h => obs.observe(h));
  }

  function trackProgress(){
    const bar = document.getElementById('progress');
    window.addEventListener('scroll', () => {
      const h = document.documentElement.scrollHeight - window.innerHeight;
      bar.style.width = h > 0 ? (window.scrollY / h * 100) + '%' : '0';
    }, { passive: true });
  }
})();
</script>
</body>
</html>
