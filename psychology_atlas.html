<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Атлас психологічних теорій</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#1a1013;
  --bg-grid:#21151a;
  --territory:#2b1920;
  --territory-border:#4a2e37;
  --card:#2b1920;
  --card-border:#4a2e37;
  --text:#ede2d3;
  --text-dim:#b3a292;
  --text-faint:#7d6a5e;
  --gold:#c98a3f;
  --green:#7c8f70;
  --green-dim:#4e5c47;
  --amber:#c98a3f;
  --amber-dim:#7d5a2e;
  --coral:#a8583f;
  --coral-dim:#6b3a2a;
  --bg-soft:#21151a;
  --border-soft:#3a2229;
  --gold-soft:#3d2a1a;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;background:var(--bg);overflow:hidden;font-family:'IBM Plex Sans',sans-serif;}
#viewport{position:relative;width:100vw;height:100vh;overflow:hidden;cursor:grab;background:
  radial-gradient(circle at 20% 20%, #161927 0%, var(--bg) 60%);}
#viewport.dragging{cursor:grabbing;}
#canvas{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform;}
.grid{display:grid;grid-template-columns:repeat(5,480px);gap:44px;padding:80px;position:relative;z-index:2;}
.territory{background:var(--territory);border:1px solid var(--territory-border);border-radius:3px;padding:22px;position:relative;}
.territory::before{content:attr(data-tag);position:absolute;top:-11px;left:20px;background:var(--bg);padding:0 10px;
  font-family:'IBM Plex Sans';font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--gold);font-weight:600;}
.territory h2{font-family:'Spectral',serif;font-weight:500;font-size:21px;color:var(--text);margin:6px 0 4px;}
.territory .sub{font-size:12px;color:var(--text-dim);margin:0 0 16px;line-height:1.5;}
.nodes{display:flex;flex-wrap:wrap;gap:10px;}
.node{width:212px;background:var(--card);border:1px solid var(--card-border);border-radius:2px;padding:10px 12px;
  cursor:pointer;transition:border-color .15s, transform .15s, opacity .2s;}
.node:hover{border-color:var(--gold);transform:translateY(-2px);}
.node.dim{opacity:0.18;}
.node.active{border-color:var(--gold);border-width:1.5px;}
.node-top{display:flex;align-items:center;gap:7px;margin-bottom:3px;}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.dot.green{background:var(--green);}
.dot.amber{background:var(--amber);}
.dot.coral{background:var(--coral);}
.node-name{font-family:'Spectral',serif;font-size:14.5px;color:var(--text);font-weight:500;}
.node-fig{font-size:11px;color:var(--text-dim);margin-left:15px;}
svg#connections{position:absolute;top:0;left:0;pointer-events:none;z-index:1;overflow:visible;}
svg#connections path{fill:none;stroke:var(--gold);stroke-width:1;stroke-dasharray:2 4;opacity:0.35;}

#toolbar{position:fixed;top:20px;left:20px;z-index:10;display:flex;gap:10px;align-items:center;}
#search{background:var(--card);border:1px solid var(--card-border);color:var(--text);border-radius:3px;
  padding:10px 14px;font-family:'IBM Plex Sans';font-size:13px;width:230px;outline:none;}
#search::placeholder{color:var(--text-faint);}
#search:focus{border-color:var(--gold);}
.zoombtn{background:var(--card);border:1px solid var(--card-border);color:var(--text);border-radius:3px;
  width:36px;height:36px;font-size:16px;cursor:pointer;font-family:'IBM Plex Sans';}
.zoombtn:hover{border-color:var(--gold);}

#legend{position:fixed;bottom:20px;left:20px;z-index:10;background:var(--card);border:1px solid var(--card-border);
  border-radius:3px;padding:14px 16px;font-size:12px;color:var(--text-dim);}
#legend .row{display:flex;align-items:center;gap:8px;margin:5px 0;cursor:pointer;}
#legend .title{font-family:'Spectral',serif;font-size:13px;color:var(--text);margin-bottom:8px;font-weight:500;}

#panel{position:fixed;top:0;right:-380px;width:360px;height:100%;background:var(--territory);
  border-left:1px solid var(--territory-border);z-index:20;transition:right .25s ease;padding:32px 28px;overflow-y:auto;}
#panel.open{right:0;}
#panel .close{position:absolute;top:22px;right:22px;background:none;border:none;color:var(--text-dim);
  font-size:20px;cursor:pointer;}
#panel .badge{display:inline-block;font-size:10.5px;letter-spacing:.09em;text-transform:uppercase;
  padding:4px 2px;margin-bottom:14px;font-weight:600;border-top:1px solid currentColor;border-bottom:1px solid currentColor;background:none !important;}
#panel .badge.green{color:var(--green);}
#panel .badge.amber{color:var(--amber);}
#panel .badge.coral{color:var(--coral);}
#panel h3{font-family:'Spectral',serif;font-size:26px;color:var(--text);margin:0 0 4px;font-weight:500;}
#panel .figures{font-size:13px;color:var(--gold);margin-bottom:20px;}
#panel .label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-faint);margin:18px 0 6px;}
#panel p{font-size:14px;line-height:1.6;color:var(--text-dim);margin:0;}
#panel .sources{list-style:none;margin:0;padding:0;}
#panel .sources li{font-size:13px;line-height:1.55;color:var(--text-dim);margin:0 0 10px;padding-left:18px;position:relative;}
#panel .sources li::before{content:'—';position:absolute;left:0;color:var(--gold);}
#panel .sources .src-authors{color:var(--text);font-weight:500;}
#panel .sources .src-year{color:var(--text-faint);font-family:'IBM Plex Mono',monospace;}
#panel .sources a{color:var(--gold);text-decoration:none;border-bottom:1px dotted var(--gold-soft);}
#panel .sources a:hover{border-bottom-style:solid;}
#panel .no-sources{font-size:12.5px;color:var(--text-faint);font-style:italic;}

#hint{position:fixed;bottom:20px;right:20px;z-index:10;font-size:11px;color:var(--text-faint);text-align:right;
  font-family:'IBM Plex Sans';line-height:1.6;}

.gs-trigger{background:var(--card);border:1px solid var(--card-border);color:var(--text-dim);
  border-radius:3px;padding:0 14px;height:38px;font-size:13px;cursor:pointer;display:flex;
  align-items:center;gap:7px;transition:.15s;white-space:nowrap;}
.gs-trigger:hover{border-color:var(--gold);color:var(--text);}
.gs-trigger kbd{background:var(--bg-soft);border:1px solid var(--border-soft);border-radius:4px;
  padding:1px 6px;font-size:10.5px;font-family:monospace;color:var(--text-faint);}
#gs-overlay{position:fixed;inset:0;z-index:100;background:rgba(10,11,17,.75);backdrop-filter:blur(3px);
  display:none;align-items:flex-start;justify-content:center;padding:9vh 20px 20px;}
#gs-overlay.open{display:flex;}
#gs-modal{width:100%;max-width:600px;background:var(--bg-soft);border:1px solid var(--card-border);
  border-radius:4px;box-shadow:0 30px 80px rgba(0,0,0,.5);overflow:hidden;max-height:76vh;
  display:flex;flex-direction:column;}
#gs-input-row{display:flex;align-items:center;gap:10px;padding:16px 18px;border-bottom:1px solid var(--border-soft);}
#gs-input-row svg{flex-shrink:0;opacity:.5;}
#gs-input{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:17px;font-family:'IBM Plex Sans';}
#gs-input::placeholder{color:var(--text-faint);}
#gs-esc{font-size:11px;color:var(--text-faint);border:1px solid var(--border-soft);border-radius:5px;padding:3px 8px;flex-shrink:0;}
#gs-results{overflow-y:auto;padding:8px;}
#gs-results .gs-empty{padding:40px 20px;text-align:center;color:var(--text-faint);font-size:13.5px;}
.gs-item{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:3px;cursor:pointer;
  text-decoration:none;color:var(--text);transition:background .1s;}
.gs-item:hover, .gs-item.gs-active{background:var(--card);}
.gs-item .gs-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.gs-item .gs-body{min-width:0;flex:1;}
.gs-item .gs-label{font-size:14.5px;font-weight:500;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.gs-item .gs-snippet{font-size:12px;color:var(--text-faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.gs-item .gs-domain{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--gold);
  flex-shrink:0;border:1px solid var(--gold-soft);border-radius:1px;padding:3px 9px;border-top:1px solid var(--gold-soft);border-bottom:1px solid var(--gold-soft);}
mark{background:rgba(201,138,63,.35);color:inherit;border-radius:3px;padding:0 1px;}
@media (max-width: 640px){
  .gs-trigger span.gs-label-text{display:none;}
  .gs-trigger{padding:0 10px;width:38px;justify-content:center;}
  #gs-overlay{padding:0;}
  #gs-modal{max-width:100%;height:100%;max-height:100%;border-radius:0;}
  #gs-input{font-size:16px;}
  .gs-item .gs-domain{display:none;}
  #toolbar{flex-wrap:wrap;}
}
</style>
</head>
<body>

<div id="toolbar">
  <button class="gs-trigger"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><span class="gs-label-text">Пошук по атласу</span><kbd>/</kbd></button>
  <input id="search" placeholder="Пошук теорії або автора...">
  <button class="zoombtn" onclick="zoomBy(1.2)">+</button>
  <button class="zoombtn" onclick="zoomBy(0.8)">−</button>
  <button class="zoombtn" onclick="resetView()" style="width:auto;padding:0 12px;font-size:12px;">⟲</button>
</div>

<div id="legend">
  <div class="title">Строгість теорії</div>
  <div class="row" onclick="filterRigor('green')"><span class="dot green"></span>формалізована, висока емпірична база</div>
  <div class="row" onclick="filterRigor('amber')"><span class="dot amber"></span>валідна, менш формалізована</div>
  <div class="row" onclick="filterRigor('coral')"><span class="dot coral"></span>історична спадщина, слабша строгість</div>
</div>

<div id="hint">Тягни щоб пересуватись · колесо миші щоб зумити<br>клікни вузол для деталей</div>

<div id="panel">
  <button class="close" onclick="closePanel()">×</button>
  <div class="badge" id="p-badge">строгість</div>
  <h3 id="p-name"></h3>
  <div class="figures" id="p-figures"></div>
  <div class="label">Ключова теза</div>
  <p id="p-claim"></p>
  <div class="label">Слабке місце / критика</div>
  <p id="p-critique"></p>
  <div class="label">Джерела</div>
  <div id="p-sources"></div>
</div>

<div id="viewport">
  <div id="canvas">
    <svg id="connections"></svg>
    <div class="grid" id="grid"></div>
  </div>
</div>

<script>
const DATA = [
{tag:"Школа", name:"Психодинамічна традиція", sub:"Несвідоме, внутрішні конфлікти, ранній досвід", nodes:[
  {id:"freud", name:"Класичний психоаналіз", fig:"Фройд", rigor:"coral", claim:"Поведінка керується несвідомими драйвами і конфліктами, витісненими з дитинства.", critique:"Ненаукова методологія: гіпотези практично не фальсифікуються, клінічні кейси не відтворюються."},
  {id:"defenses", name:"Захисні механізми", fig:"А. Фройд", rigor:"coral", claim:"Его несвідомо спотворює реальність, щоб захиститись від тривоги — витіснення, проекція, заперечення, раціоналізація, сублімація та інші механізми діють автоматично, поза свідомим контролем людини.", critique:"Клінічно інтуїтивно переконливі й досі широко використовуються як мова опису в психодинамічній традиції, але емпірично важко операціоналізувати й перевірити — сам факт застосування конкретного механізму часто визначається post-hoc інтерпретацією терапевта, а не незалежним виміром."},
  {id:"jung", name:"Аналітична психологія", fig:"Юнг", rigor:"coral", claim:"Психіка містить колективне несвідоме з архетипами, спільними для всього людства.", critique:"Архетипи не мають операційного визначення й не піддаються прямій емпіричній перевірці."},
  {id:"adler", name:"Індивідуальна психологія", fig:"Адлер", rigor:"coral", claim:"Головна рушійна сила — компенсація почуття неповноцінності через прагнення до переваги.", critique:"Модель надто загальна, пояснює постфактум майже будь-яку поведінку однаково добре."},
  {id:"objrel", name:"Обʼєктні відносини", fig:"Кляйн, Вінникот", rigor:"amber", claim:"Особистість формується через інтерналізацію ранніх стосунків зі значущими іншими.", critique:"Клінічно багата, але спирається переважно на case-study, слабко формалізована."},

]},
{tag:"Школа", name:"Біхевіоризм", sub:"Спостережувана поведінка, научання через підкріплення", nodes:[

  {id:"skinner", name:"Оперантне обумовлення", fig:"Скіннер", rigor:"green", claim:"Поведінка закріплюється або згасає залежно від наслідків, які вона викликає.", critique:"Свідомо ігнорує внутрішні когнітивні процеси як обʼєкт вивчення."},
  {id:"bandura", name:"Соціальне научання", fig:"Бандура", rigor:"green", claim:"Люди навчаються через спостереження за іншими, без прямого підкріплення.", critique:"Місток до когнітивізму — сам Бандура згодом визнав недостатність чистого біхевіоризму."}
]},
{tag:"Школа", name:"Когнітивна традиція", sub:"Мислення як обробка інформації", nodes:[
  {id:"piaget", name:"Стадії когнітивного розвитку", fig:"Піаже", rigor:"coral", claim:"Дитина проходить чіткі універсальні стадії побудови логічних схем мислення.", critique:"Точні вікові межі стадій не підтвердились крос-культурно; діти здатні на більше раніше."},
  {id:"beck", name:"Когнітивна модель / КПТ", fig:"Бек", rigor:"green", claim:"Емоційні розлади підтримуються викривленими автоматичними думками і схемами.", critique:"Сильна для симптомів, слабша у поясненні глибинних причин розладу."},

  {id:"kahneman", name:"Евристики і упередження", fig:"Канеман, Тверскі", rigor:"green", claim:"Мислення працює через дві системи: швидку інтуїтивну і повільну аналітичну.", critique:"Частина класичних ефектів (напр. деякі прайминг-ефекти) не відтворилась у replication-хвилі."},
  {id:"neisser", name:"Обробка інформації", fig:"Найссер", rigor:"amber", claim:"Пізнання можна моделювати як послідовність етапів обробки сигналу, як у компʼютері.", critique:"Метафора компʼютера погано описує паралельність і контекстність реального мозку."},

  {id:"perls", name:"Гештальт-терапія", fig:"Перлз", rigor:"coral", claim:"Зцілення відбувається через усвідомлення цілісного досвіду тут-і-зараз.", critique:"Слабка теоретична база, ефективність підтверджена радше клінічно, ніж експериментально."}
]},

{tag:"Школа", name:"Соціальна психологія", sub:"Як присутність і думка інших змінює поведінку", nodes:[
  {id:"milgram", name:"Експерименти слухняності", fig:"Мілґрем", rigor:"green", claim:"Звичайні люди готові завдавати серйозної шкоди іншим, якщо наказ надходить від легітимного авторитету — навіть без прямого тиску чи погроз.", critique:"Етично неприйнятний за сучасними стандартами (учасників активно обманювали й піддавали сильному стресу); показники слухняності суттєво варіюють залежно від точного протоколу й контексту дослідження."},
  {id:"asch", name:"Ефект конформності", fig:"Аш", rigor:"green", claim:"Люди свідомо дають неправильну відповідь на просте перцептивне завдання, аби не суперечити одностайній думці групи.", critique:"Ефект сильно залежить від культури (вищий у колективістських) і чисельно менший у сучасних повтореннях, ніж в оригінальних дослідженнях 1950-х."},
  {id:"festinger", name:"Теорія когнітивного дисонансу", fig:"Фестінгер", rigor:"green", claim:"Суперечність між переконанням і дією створює психологічний дискомфорт, який людина усуває, змінюючи саме переконання, а не дію.", critique:"Класична теорія із сотнями реплікацій, але існує кілька конкуруючих пояснень тих самих ефектів (напр. теорія самосприйняття Бема) — досі не до кінця ясно, який механізм первинний."},
  {id:"zimbardo", name:"Стенфордський тюремний експеримент", fig:"Зімбардо", rigor:"coral", claim:"Ситуаційна роль (наглядач/увʼязнений) сама собою штовхає звичайних людей до жорстокої чи покірної поведінки, незалежно від особистості.", critique:"Розсекречені записи й журналістські розслідування показали: дослідник активно інструктував 'наглядачів' бути жорсткішими — результат значною мірою підганявся, а не спостерігався спонтанно. Одна з найгучніших методологічних дискредитацій в історії психології."},
  {id:"cialdini", name:"Принципи впливу і переконання", fig:"Чалдіні", rigor:"amber", claim:"Існує невелика кількість універсальних психологічних важелів (взаємність, послідовність, соціальний доказ, авторитет, симпатія, дефіцит), які систематично підвищують згоду.", critique:"Синтез прикладних спостережень, а не єдина перевірювана теорія; частина класичних ефектів впливу останніми роками показала слабшу відтворюваність у великих реплікаційних проєктах."}
]},
{tag:"Школа", name:"Клінічні підходи", sub:"Терапевтичні модальності — не теорії, а робочі інструменти зміни", nodes:[
  {id:"dbt", name:"Діалектична поведінкова терапія (ДБТ)", fig:"Лайнен", rigor:"green", claim:"Поєднує на перший погляд суперечливі стратегії — беззастережне прийняття поточного стану і водночас активну роботу над зміною — через навчання чотирьох наборів навичок: усвідомленості, толерантності до дистресу, регуляції емоцій і міжособистісної ефективності.", critique:"Найсильніша доказова база серед 'терапій третьої хвилі' саме для прикордонного розладу особистості й хронічної суїцидальності; для інших станів доказів менше.", sources:[{authors:"Linehan, M.M.",year:"1993",title:"Cognitive-Behavioral Treatment of Borderline Personality Disorder",url:""}]},
  {id:"act", name:"Терапія прийняття та відповідальності (АСТ)", fig:"Хейз", rigor:"green", claim:"Мета не позбутися неприємних думок і почуттів, а змінити стосунки з ними — через психологічну гнучкість, когнітивне дефузування (бачити думку як думку, а не факт) і дії, узгоджені з особистими цінностями.", critique:"Метааналізи показують ефективність, порівнянну з класичною КПТ, але механізм дії (психологічна гнучкість як медіатор) підтверджений менш однозначно, ніж сама клінічна ефективність.", sources:[{authors:"Hayes, S.C., Strosahl, K.D. & Wilson, K.G.",year:"1999",title:"Acceptance and Commitment Therapy",url:""}]},
  {id:"schema", name:"Схема-терапія", fig:"Янг", rigor:"amber", claim:"Ранні дезадаптивні схеми — стійкі патерни, що формуються з незадоволених базових потреб дитинства — активуються в дорослому житті через 'режими' (внутрішні стани), з якими терапевт працює напряму, включно з обмеженим репарентингом.", critique:"Інтегративний підхід (психодинаміка + КПТ + прив'язаність), тому важче ізольовано перевірити, який саме компонент дає ефект; найбільше доказів для прикордонного розладу особистості.", sources:[{authors:"Young, J.E., Klosko, J.S. & Weishaar, M.E.",year:"2003",title:"Schema Therapy: A Practitioner's Guide",url:""}]},
  {id:"emdr", name:"EMDR (десенсибілізація і репроцесинг рухами очей)", fig:"Шапіро", rigor:"amber", claim:"Білатеральна стимуляція (типово — рухи очей за пальцем терапевта) під час пригадування травматичної події сприяє переробці спогаду так, що він втрачає емоційну гостроту.", critique:"Клінічна ефективність для ПТСР добре підтверджена, але науковий консенсус щодо того, чи потрібні саме рухи очей (а не просто структурована експозиція), досі не досягнутий — компонентні дослідження дають суперечливі результати.", sources:[{authors:"Shapiro, F.",year:"1989",title:"Efficacy of the eye movement desensitization procedure in the treatment of traumatic memories",url:"https://doi.org/10.1002/jts.2490020207"}]},
  {id:"eft", name:"Терапія, сфокусована на емоціях (EFT)", fig:"Гринберг", rigor:"amber", claim:"Емоція — не перешкода для розв'язання проблеми, а первинний засіб зміни: терапія допомагає розрізняти адаптивні й дезадаптивні емоційні реакції та трансформувати другі через безпечне переживання перших.", critique:"Сильна доказова база в парній терапії (EFT-C Джонсон), дещо менша для індивідуального формату; теоретична мова 'первинних/вторинних' емоцій важко операціоналізується для дослідження.", sources:[{authors:"Greenberg, L.S.",year:"2004",title:"Emotion–focused therapy",url:"https://doi.org/10.1002/cpp.388"}]},
  {id:"mbct", name:"Майндфулнес-когнітивна терапія (MBCT)", fig:"Сігал, Вільямс, Тісдейл", rigor:"green", claim:"Поєднує практики усвідомленості з когнітивною терапією для запобігання рецидиву депресії — навчає розпізнавати ранні патерни румінації як ментальні події, а не факти, до того як вони переростуть у повний епізод.", critique:"Найсильніші докази саме для профілактики рецидиву в людей із трьома і більше епізодами депресії в анамнезі; для гострого епізоду ефективність нижча за стандартну КПТ.", sources:[{authors:"Teasdale, J.D., Segal, Z.V., Williams, J.M.G. et al.",year:"2000",title:"Prevention of relapse/recurrence in major depression by mindfulness-based cognitive therapy",url:"https://doi.org/10.1037/0022-006X.68.4.615"}]},
  {id:"mi", name:"Мотиваційне інтерв'ю", fig:"Міллер, Ролнік", rigor:"green", claim:"Замість переконувати людину змінитися, терапевт досліджує й підсилює власну амбівалентність клієнта щодо зміни — 'мова змін', яку людина промовляє вголос сама, передбачає реальну поведінкову зміну краще за зовнішній тиск.", critique:"Дуже добре підтверджена для залежностей і охорони здоров'я; ефект зазвичай помірний і найкраще працює як доповнення до інших інтервенцій, а не самостійна повна терапія.", sources:[{authors:"Miller, W.R. & Rollnick, S.",year:"1991",title:"Motivational Interviewing: Preparing People to Change Addictive Behavior",url:""}]}
]}
];

const CONNECTIONS = [
  ["attach","sdt"],["attach","panksepp"],["leontiev","sdt"],["kegan","leontiev"],
  ["beck","friston"],["bandura","piaget"],["maslow","sdt"],["rogers","sdt"],
  ["bronfenbrenner","vygotsky"],["erikson","kegan"],["damasio","attach"],
  ["skinner","beck"],["seligman","beck"],["cosmides","kahneman"],
  ["milgram","zimbardo"],["asch","tajfel"],["cialdini","skinner"],
  ["chomsky","vygotsky"],["kohlberg","erikson"],["csikszentmihalyi","sdt"],
  ["zimbardo","tajfel"],["festinger","bandura"],
  ["dbt","panksepp"],["act","sdt"],["schema","attach"],["emdr","attach"],
  ["eft","panksepp"],["mbct","beck"],["mi","festinger"],
  ["defenses","freud"],["defenses","schema"],
  ["distortions","beck"],["distortions","act"],["distortions","mbct"],
  ["gfactor","bigfive"],["hofstede","tajfel"]
];

const grid = document.getElementById('grid');
const nodeEls = {};
DATA.forEach(t=>{
  const terr = document.createElement('div');
  terr.className='territory';
  terr.setAttribute('data-tag', t.tag);
  terr.innerHTML = `<h2>${t.name}</h2><div class="sub">${t.sub}</div><div class="nodes"></div>`;
  const nodesWrap = terr.querySelector('.nodes');
  t.nodes.forEach(n=>{
    const el = document.createElement('div');
    el.className='node';
    el.dataset.id=n.id;
    el.dataset.name=(n.name+' '+n.fig).toLowerCase();
    el.innerHTML = `<div class="node-top"><span class="dot ${n.rigor}"></span><span class="node-name">${n.name}</span></div><div class="node-fig">${n.fig}</div>`;
    el.onclick = ()=>openPanel(n);
    nodesWrap.appendChild(el);
    nodeEls[n.id]=el;
  });
  grid.appendChild(terr);
});

function drawConnections(){
  const svg = document.getElementById('connections');
  const canvasRect = document.getElementById('canvas').getBoundingClientRect();
  const s = scale;
  svg.innerHTML='';
  svg.setAttribute('width', grid.scrollWidth);
  svg.setAttribute('height', grid.scrollHeight);
  CONNECTIONS.forEach(([a,b])=>{
    const elA = nodeEls[a], elB = nodeEls[b];
    if(!elA||!elB) return;
    const ra = elA.getBoundingClientRect(), rb = elB.getBoundingClientRect();
    const x1 = (ra.left-canvasRect.left)/s + ra.width/2/s;
    const y1 = (ra.top-canvasRect.top)/s + ra.height/2/s;
    const x2 = (rb.left-canvasRect.left)/s + rb.width/2/s;
    const y2 = (rb.top-canvasRect.top)/s + rb.height/2/s;
    const mx=(x1+x2)/2, my=(y1+y2)/2 - 40;
    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d', `M${x1},${y1} Q${mx},${my} ${x2},${y2}`);
    svg.appendChild(path);
  });
}

let scale=1, tx=0, ty=0, dragging=false, sx=0, sy=0, stx=0, sty=0;
const viewport = document.getElementById('viewport');
const canvas = document.getElementById('canvas');

function applyTransform(){ canvas.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`; }

function resetView(){
  const vw = viewport.clientWidth, vh = viewport.clientHeight;
  const cw = grid.scrollWidth, ch = grid.scrollHeight;
  scale = Math.min(vw/cw, vh/ch) * 0.92;
  scale = Math.max(0.28, Math.min(scale, 1));
  tx = (vw - cw*scale)/2;
  ty = (vh - ch*scale)/2;
  applyTransform();
}

function zoomBy(f){
  const vw = viewport.clientWidth/2, vh = viewport.clientHeight/2;
  const prev = scale;
  scale = Math.max(0.25, Math.min(scale*f, 2.2));
  tx = vw - (vw-tx)*(scale/prev);
  ty = vh - (vh-ty)*(scale/prev);
  applyTransform();
}

viewport.addEventListener('wheel', e=>{
  e.preventDefault();
  const rect = viewport.getBoundingClientRect();
  const mx = e.clientX-rect.left, my = e.clientY-rect.top;
  const prev = scale;
  scale = Math.max(0.25, Math.min(scale*(e.deltaY<0?1.1:0.9), 2.2));
  tx = mx - (mx-tx)*(scale/prev);
  ty = my - (my-ty)*(scale/prev);
  applyTransform();
},{passive:false});

viewport.addEventListener('pointerdown', e=>{
  if(e.target.closest('.node')) return;
  dragging=true; viewport.classList.add('dragging');
  sx=e.clientX; sy=e.clientY; stx=tx; sty=ty;
});
window.addEventListener('pointermove', e=>{
  if(!dragging) return;
  tx = stx + (e.clientX-sx);
  ty = sty + (e.clientY-sy);
  applyTransform();
});
window.addEventListener('pointerup', ()=>{ dragging=false; viewport.classList.remove('dragging'); });

function openPanel(n){
  document.querySelectorAll('.node').forEach(el=>el.classList.remove('active'));
  nodeEls[n.id].classList.add('active');
  document.getElementById('p-name').textContent = n.name;
  document.getElementById('p-figures').textContent = n.fig;
  document.getElementById('p-claim').textContent = n.claim;
  document.getElementById('p-critique').textContent = n.critique;
  const srcWrap = document.getElementById('p-sources');
  srcWrap.innerHTML = '';
  if(n.sources && n.sources.length){
    const ul = document.createElement('ul');
    ul.className = 'sources';
    n.sources.forEach(s=>{
      const li = document.createElement('li');
      const esc = t => (t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');
      const link = s.url ? `<a href="${esc(s.url)}" target="_blank" rel="noopener">${esc(s.title)}</a>` : esc(s.title);
      li.innerHTML = `<span class="src-authors">${esc(s.authors)}</span> <span class="src-year">(${esc(s.year)})</span>. ${link}`;
      ul.appendChild(li);
    });
    srcWrap.appendChild(ul);
  } else {
    srcWrap.innerHTML = '<div class="no-sources">Джерела для цього вузла ще не додані.</div>';
  }
  const badge = document.getElementById('p-badge');
  badge.className = 'badge '+n.rigor;
  badge.textContent = n.rigor==='green'?'висока строгість':n.rigor==='amber'?'середня строгість':'нижча строгість';
  document.getElementById('panel').classList.add('open');
}
function closePanel(){
  document.getElementById('panel').classList.remove('open');
  document.querySelectorAll('.node').forEach(el=>el.classList.remove('active'));
}

document.getElementById('search').addEventListener('input', e=>{
  const q = e.target.value.trim().toLowerCase();
  document.querySelectorAll('.node').forEach(el=>{
    el.classList.toggle('dim', q.length>0 && !el.dataset.name.includes(q));
  });
});

let activeFilter=null;
function filterRigor(r){
  activeFilter = activeFilter===r? null : r;
  document.querySelectorAll('.node').forEach(el=>{
    const dot = el.querySelector('.dot');
    const has = dot.classList.contains(activeFilter);
    el.classList.toggle('dim', activeFilter!==null && !has);
  });
}

window.addEventListener('load', ()=>{
  resetView();
  setTimeout(drawConnections, 100);
});
window.addEventListener('resize', ()=>{ drawConnections(); });

// Deep-link: якщо в URL є #id — відкрити відповідну теорію (для глобального пошуку)
if(location.hash){
  const targetId = location.hash.slice(1);
  const n = Object.values(nodeEls).length ? DATA.flatMap(t=>t.nodes).find(x=>x.id===targetId) : null;
  if(n){
    setTimeout(()=>{
      openPanel(n);
      const el = nodeEls[targetId];
      if(el) el.scrollIntoView({block:'center', inline:'center'});
    }, 350);
  }
}

</script>
