<script>
// Адаптер: старий позиційний формат N(id,label,cat,func,clin[,shape/stub])
// приводимо до формату ядра N(id,label,cat,{func,clin,...}).
const _N = (id,label,cat,a4,a5,a6)=>{
  const o={};
  if (typeof a4==='string'){ o.func=a4; if(a5) o.clin=a5; }
  else if (a4 && typeof a4==='object'){ Object.assign(o,a4); }
  // circuits/affect use N(id,label,cat,shape,func,clin): detect shape as 4th
  if (typeof a4==='string' && ['ellipse','diamond','round-rectangle','hexagon'].includes(a4)){
    o.shape=a4; o.func=a5; o.clin=a6;
  }
  return {data:Object.assign({id,label,cat},o)};
};
const N=_N;
const E=(s,t,label)=>({data:{id:s+'_'+t+(label||''),source:s,target:t,label:label||''}});

const nodes = [

N('hva','Гомованілінова кислота','metab','Кінцевий метаболіт дофаміну.','Концентрація HVA в лікворі історично використовувалась як маркер обміну дофаміну.'),
N('normet','Норметанефрин','metab','Метаболіт норадреналіну через COMT.'),
N('vma','Ванілілмигдалева кислота','metab','Кінцевий метаболіт норадреналіну й адреналіну.','VMA в добовій сечі — класичний скринінговий маркер феохромоцитоми.'),

N('ht2a','5-HT2A','receptor','Gq-звʼязаний.','Мішень психоделіків і атипових антипсихотиків.'),
N('ht3','5-HT3','receptor','Єдиний іонотропний серотоніновий рецептор.','Мішень протиблювотних (ондансетрон).'),
N('gln','Глутамін','sub','Циклується з глутаматом у гліально-нейрональному циклі.'),
N('glu','Глутамат','nt','Головний збуджуючий медіатор ЦНС.','Надмірна активація NMDA — ексайтотоксичність при інсульті.'),
N('gaba','ГАМК','nt','Головний гальмівний медіатор ЦНС.','GAD — мішень аутоантитіл при stiff-person syndrome.'),

N('gabab','GABA-B','receptor','Метаботропний, Gi-звʼязаний.','Мішень баклофену при спастичності.'),
N('cho','Холін','sub','Попередник ацетилхоліну.'),
N('accoa','Ацетил-КоА','sub','Другий субстрат синтезу ацетилхоліну.'),
N('ach','Ацетилхолін','nt','Медіатор навчання, уваги і нервово-мʼязової передачі.','Дефіцит холінергічних нейронів — ключова ланка при Альцгеймері.'),
N('cho2','Холін (реутилізація)','sub','Повертається в термінал для повторного синтезу.'),
N('acetate','Ацетат','metab','Побічний продукт гідролізу ацетилхоліну.'),
N('nach','Нікотиновий рецептор','receptor','Іонотропний катіонний канал.','Мішень нікотину; в нервово-мʼязовому синапсі — мішень міорелаксантів.'),
N('mach','Мускариновий рецептор','receptor','Метаботропний, підтипи M1-M5.','M1 (гіпокамп) — Gq; M2 (серце) — Gi.'),

N('vtransport','Везикулярне завантаження','transporter','Специфічні транспортери упаковують медіатор у везикулу.','VMAT2, VGAT, VGLUT, VAChT — різні білки, один принцип.'),

];

const edges = [

E('da','dopac','MAO'),E('dopac','hva','COMT'),E('da','threemt','COMT'),E('threemt','hva','MAO'),
E('ne','normet','COMT'),E('normet','vma','MAO'),
E('da','d1'),E('da','d2'),E('ne','alpha1'),E('ne','beta'),E('epi','beta'),
E('trp','fivehtp','TPH2'),E('fivehtp','ser','AADC'),E('ser','nas','AANAT'),E('nas','mel','ASMT'),
E('ser','fivehial','MAO'),E('fivehial','fivehiaa','ALDH'),
E('ser','ht1a'),E('ser','ht2a'),E('ser','ht3'),
E('gln','glu','GLS'),E('glu','gaba','GAD'),E('gaba','ssa','GABA-T'),E('ssa','succ','SSADH'),
E('glu','nmda'),E('glu','ampa'),E('glu','mglur'),E('gaba','gabaa'),E('gaba','gabab'),
E('cho','ach','ChAT'),E('accoa','ach','ChAT'),E('ach','cho2','AChE'),E('ach','acetate','AChE'),
E('ach','nach'),E('ach','mach'),
E('d1','gs'),E('beta','gs'),E('d2','gi'),E('alpha1','gq'),E('ht1a','gi'),E('ht2a','gq'),
E('mglur','gq'),E('gabab','gi'),E('mach','gq'),
E('gs','ac'),E('ac','camp'),E('camp','pka'),
E('gq','plc'),E('plc','ip3dag'),E('ip3dag','pkc'),
E('nmda','ionflux'),E('ampa','ionflux'),E('gabaa','ionflux'),E('ht3','ionflux'),E('nach','ionflux'),
E('da','vtransport'),E('ser','vtransport'),E('gaba','vtransport'),E('glu','vtransport'),E('ach','vtransport'),
E('vtransport','dock'),E('dock','ca2'),E('ca2','exo'),E('exo','reuptake')
];

const catColor = {sub:'#7d8399',nt:'#5fb583',metab:'#c97a63',receptor:'#4a9db0',
  messenger:'#9b87c4',transporter:'#d9a94f',ion:'#6b9fd6',vesicle:'#c986ab'};
const catLabel = {sub:'попередник',nt:'нейромедіатор',metab:'метаболіт',receptor:'рецептор',
  messenger:'другий посередник',transporter:'транспортер',ion:'іонний потік',vesicle:'везикулярний цикл'};

(()=>{ const n=nodes.find(x=>x.data.id==='ser'); if(n){ n.data.xref=(n.data.xref||[]).concat([{domain:'psychopathology',focus:'depression',label:'Роль у депресії'}]); } })();
const _src = {"da": [{"authors": "Carlsson, A., Lindqvist, M. & Magnusson, T.", "year": "1957", "title": "3,4-Dihydroxyphenylalanine and 5-hydroxytryptophan as reserpine antagonists (перше визнання дофаміну як медіатора)", "url": "https://doi.org/10.1038/1801200a0"}]};
nodes.forEach(n=>{ if(_src[n.data.id]) n.data.sources = _src[n.data.id]; });
AtlasMap.build({nodes, edges, catColor, catLabel});
</script>
